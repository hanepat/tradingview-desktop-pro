<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="HxYbh7tvudJGNE4bS7wLLnb-Gs2S0mwSe4sMQcscM2M" />
    <title>LICENSE.MD</title>
    <!-- Подключаем официальные стили GitHub для Markdown -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
    <!-- Подключаем библиотеку Showdown для преобразования Markdown в HTML -->
    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    <style>
        /* Стили для контейнера — в точности как на GitHub */
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
        }
        /* На мобильных устройствах отступы меньше */
        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }
    </style>
</head>
<body class="markdown-body">
    <div id="content"></div>

    <script>
        // Загружаем ваш файл LICENSE.MD
        fetch('LICENSE.MD')
            .then(response => {
                if (!response.ok) throw new Error('Файл LICENSE.MD не найден');
                return response.text();
            })
            .then(markdown => {
                // Настраиваем Showdown для поддержки расширенного синтаксиса GitHub
                const converter = new showdown.Converter({
                    tables: true,           // поддержка таблиц
                    strikethrough: true,    // зачёркнутый текст
                    emoji: true,            // эмодзи :)
                    tasklists: true,        // чек-листы
                    simplifiedAutoLink: true // автоматические ссылки
                });
                // Преобразуем Markdown в HTML
                const html = converter.makeHtml(markdown);
                // Вставляем результат на страницу
                document.getElementById('content').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = '<p style="color:red;">⚠️ Ошибка: файл LICENSE.MD не загружен. Убедитесь, что он есть в корне репозитория.</p>';
                console.error('Ошибка загрузки:', error);
            });
    </script>
</body>
</html>
